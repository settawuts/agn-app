  deploy:
    runs-on: self-hosted
    needs: build    
    environment: prod       

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup kubectl
        run: |
          if ! command -v kubectl &> /dev/null; then
            sudo snap install kubectl --classic
          fi

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy DEV
        if: github.ref == 'refs/heads/dev'
        run: |
          kubectl apply -f k8s/configmap-dev.yaml
          kubectl apply -f k8s/api/deployment.yaml
          kubectl apply -f k8s/api/service.yaml
          kubectl apply -f k8s/api/hpa.yaml
          kubectl apply -f k8s/worker/deployment.yaml
          kubectl set image deployment/agn-api agn-api=$IMAGE_NAME_API:${{ needs.build.outputs.image_tag }}
          kubectl set image deployment/agn-worker agn-worker=$IMAGE_NAME_WORKER:${{ needs.build.outputs.image_tag }}
          kubectl rollout status deployment/agn-api
          kubectl rollout status deployment/agn-worker

      - name: Deploy SIT
        if: github.ref == 'refs/heads/sit'
        run: |
          kubectl apply -f k8s/configmap-sit.yaml
          kubectl apply -f k8s/api/deployment.yaml
          kubectl apply -f k8s/api/service.yaml
          kubectl apply -f k8s/api/hpa.yaml
          kubectl apply -f k8s/worker/deployment.yaml
          kubectl set image deployment/agn-api agn-api=$IMAGE_NAME_API:${{ needs.build.outputs.image_tag }}
          kubectl set image deployment/agn-worker agn-worker=$IMAGE_NAME_WORKER:${{ needs.build.outputs.image_tag }}
          kubectl rollout status deployment/agn-api
          kubectl rollout status deployment/agn-worker

      - name: Deploy PROD
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl apply -f k8s/configmap-prd.yaml
          kubectl apply -f k8s/api/deployment.yaml
          kubectl apply -f k8s/api/service.yaml
          kubectl apply -f k8s/api/hpa.yaml
          kubectl apply -f k8s/worker/deployment.yaml
          kubectl set image deployment/agn-api agn-api=$IMAGE_NAME_API:${{ needs.build.outputs.image_tag }}
          kubectl set image deployment/agn-worker agn-worker=$IMAGE_NAME_WORKER:${{ needs.build.outputs.image_tag }}
          kubectl rollout status deployment/agn-api
          kubectl rollout status deployment/agn-worker