name: CI-CD Pipeline

on:
  push:
    branches:
      - dev
      - prod
      - main

permissions:
  contents: read
  packages: write
  security-events: write 

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/app

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint 

      - name: Test
        run: npm test 

  codeql:
    runs-on: ubuntu-latest
    needs: lint-test 
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"


  build:
    runs-on: ubuntu-latest
    needs: codeql  

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Tag
        id: meta
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Image
        run: |
          docker build -f docker/Dockerfile.app \
            -t $IMAGE_NAME:${{ steps.meta.outputs.tag }} \
            -t $IMAGE_NAME:latest .

      - name: Push Image
        run: |
          docker push $IMAGE_NAME:${{ steps.meta.outputs.tag }}
          docker push $IMAGE_NAME:latest


  trivy:
    runs-on: ubuntu-latest
    needs: build      

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1            # ← fail pipeline ถ้าเจอ CRITICAL/HIGH

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()   
        with:
          sarif_file: trivy-results.sarif


  deploy:
    runs-on: self-hosted
    needs: trivy            

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup kubectl
        run: |
          if ! command -v kubectl &> /dev/null; then
            sudo snap install kubectl --classic
          fi

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy DEV
        if: github.ref == 'refs/heads/dev'
        run: |
          kubectl apply -f k8s/configmap-dev.yaml
          kubectl set image deployment/api api=$IMAGE_NAME:${{ needs.build.outputs.image_tag }}
          kubectl rollout status deployment/api

      - name: Deploy SIT
        if: github.ref == 'refs/heads/sit'
        run: |
          kubectl apply -f k8s/configmap-sit.yaml
          kubectl set image deployment/api api=$IMAGE_NAME:${{ needs.build.outputs.image_tag }}
          kubectl rollout status deployment/api

      - name: Deploy PROD
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl apply -f k8s/configmap-prod.yaml
          kubectl set image deployment/api api=$IMAGE_NAME:${{ needs.build.outputs.image_tag }}
          kubectl rollout status deployment/api