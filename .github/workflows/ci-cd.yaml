name: CI-CD Pipeline

on:
  push:
    branches:
      - dev
      - prod
      - main

permissions:
  contents: read
  packages: write
  security-events: write 

env:
  IMAGE_NAME_API: ghcr.io/${{ github.repository }}/agn-app-api
  IMAGE_NAME_WORKER: ghcr.io/${{ github.repository }}/agn-app-worker

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint 

      - name: Test
        run: npm test 

  codeql:
    runs-on: ubuntu-latest
    needs: lint-test 
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"


  build:
    runs-on: ubuntu-latest
    needs: codeql  

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Tag
        id: meta
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build API Image
        run: |
          docker build -f docker/Dockerfile.app \
            -t $IMAGE_NAME_API:${{ steps.meta.outputs.tag }} \
            -t $IMAGE_NAME_API:latest .

      - name: Push API Image
        run: |
          docker push $IMAGE_NAME_API:${{ steps.meta.outputs.tag }}
          docker push $IMAGE_NAME_API:latest

      - name: Build Worker Image
        run: |
          docker build -f docker/Dockerfile.worker \
            -t $IMAGE_NAME_WORKER:${{ steps.meta.outputs.tag }} \
            -t $IMAGE_NAME_WORKER:latest .

      - name: Push Worker Image
        run: |
          docker push $IMAGE_NAME_WORKER:${{ steps.meta.outputs.tag }}
          docker push $IMAGE_NAME_WORKER:latest


