apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agn-api-monitor
  namespace: monitoring   
  labels:
    release: prometheus 
spec:
  namespaceSelector:
    matchNames:
      - agn-app-dev
      - agn-app-uat
      - agn-app-prd
  selector:
    matchLabels:
      app: agn-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s